<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — PG Backup Manager</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    nav {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 56px;
    }

    nav .brand {
      font-weight: 700;
      color: #38bdf8;
      font-size: 16px;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover,
    nav a.active {
      color: #e2e8f0;
    }

    nav .logout {
      margin-left: auto;
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    nav .logout:hover {
      color: #e2e8f0;
      border-color: #64748b;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
    }

    .stat-card .label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
    }

    .green {
      color: #4ade80;
    }

    .red {
      color: #f87171;
    }

    .blue {
      color: #38bdf8;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    select {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .btn {
      background: #0284c7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s;
    }

    .btn:hover {
      background: #0369a1;
    }

    .btn.secondary {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-weight: 400;
    }

    .btn.secondary:hover {
      background: #334155;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #0f172a;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #64748b;
      padding: 12px 16px;
      text-align: left;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      border-top: 1px solid #1e293b;
    }

    tr:hover td {
      background: #1a2740;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.success {
      background: #14532d;
      color: #4ade80;
    }

    .badge.failed {
      background: #450a0a;
      color: #f87171;
    }

    .badge.pending {
      background: #1e3a5f;
      color: #7dd3fc;
    }

    .empty {
      text-align: center;
      color: #475569;
      padding: 60px;
      font-size: 15px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
    }

    .toast.show {
      display: block;
    }

    .toast.ok {
      border-color: #166534;
      color: #4ade80;
    }

    .toast.err {
      border-color: #991b1b;
      color: #f87171;
    }
  </style>
</head>

<body>
  <nav>
    <span class="brand">🛢 PG Backup Manager</span>
    <a href="/dashboard.html" class="active">Dashboard</a>
    <a href="/databases.html">Bancos de Dados</a>
    <button class="logout" onclick="logout()">Sair</button>
  </nav>

  <div class="container">
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="label">Total</div>
        <div class="value blue" id="s-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Sucesso</div>
        <div class="value green" id="s-success">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Falhas</div>
        <div class="value red" id="s-failed">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Último backup</div>
        <div class="value" id="s-last" style="font-size:13px;color:#94a3b8">—</div>
      </div>
    </div>

    <div class="toolbar">
      <h2 style="margin:0;flex:1">Backups</h2>
      <select id="filterDb">
        <option value="">Todos os bancos</option>
      </select>
      <button class="btn secondary" onclick="load()">↻ Atualizar</button>
      <button class="btn" id="btnRun" onclick="runNow()">▶ Executar agora</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Banco</th>
          <th>Arquivo</th>
          <th>Tamanho</th>
          <th>Status</th>
          <th>Data</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Nenhum backup encontrado.</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const api = (path, opts = {}) => {
      const token = localStorage.getItem('token');
      if (!token) { location.href = '/'; return Promise.reject(); }
      return fetch('/api' + path, {
        ...opts,
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers || {}) },
      }).then(r => {
        if (r.status === 401) { localStorage.removeItem('token'); location.href = '/'; }
        return r;
      });
    };

    function toast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show ' + type;
      setTimeout(() => el.className = 'toast', 3000);
    }

    function logout() {
      localStorage.removeItem('token');
      location.href = '/';
    }

    function fmtSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(2) + ' MB';
    }

    function fmtDate(d) {
      return new Date(d).toLocaleString('pt-BR');
    }

    async function loadStats() {
      const r = await api('/backups/stats');
      const d = await r.json();
      document.getElementById('s-total').textContent = d.total ?? 0;
      document.getElementById('s-success').textContent = d.success ?? 0;
      document.getElementById('s-failed').textContent = d.failed ?? 0;
      document.getElementById('s-last').textContent = d.last ? fmtDate(d.last.createdAt) : '—';
    }

    async function loadDatabases() {
      const r = await api('/databases');
      const dbs = await r.json();
      const sel = document.getElementById('filterDb');
      const current = sel.value;
      sel.innerHTML = '<option value="">Todos os bancos</option>';
      dbs.forEach(db => {
        const opt = document.createElement('option');
        opt.value = db.id;
        opt.textContent = db.name;
        if (String(db.id) === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    async function load() {
      const dbId = document.getElementById('filterDb').value;
      const r = await api('/backups' + (dbId ? '?databaseId=' + dbId : ''));
      const rows = await r.json();
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      tbody.innerHTML = '';

      if (!rows.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.database?.name ?? row.databaseId}</td>
          <td style="font-family:monospace;font-size:12px">${row.filename}</td>
          <td>${fmtSize(row.sizeBytes)}</td>
          <td><span class="badge ${row.status}">${row.status}</span></td>
          <td>${fmtDate(row.createdAt)}</td>
          <td>
            ${row.status === 'success'
            ? `<button class="btn secondary" style="padding:4px 12px;font-size:12px" onclick="download(${row.id},'${row.filename}')">⬇ Baixar</button>`
            : ''}
          </td>`;
        tbody.appendChild(tr);
      });

      await loadStats();
    }

    async function download(id, filename) {
      const token = localStorage.getItem('token');
      const a = document.createElement('a');
      a.href = `/api/backups/${id}/download`;
      a.download = filename;
      // Use fetch to attach auth header, then create object URL
      const r = await fetch(a.href, { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) { toast('Erro ao baixar arquivo', 'err'); return; }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    async function runNow() {
      const btn = document.getElementById('btnRun');
      btn.disabled = true;
      btn.textContent = '⏳ Executando...';
      try {
        const r = await api('/backups/run', { method: 'POST' });
        const d = await r.json();
        toast(`Concluído: ${d.ran} ok, ${d.failed} falhas`);
        await load();
      } catch {
        toast('Erro ao executar backup', 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = '▶ Executar agora';
      }
    }

    document.getElementById('filterDb').addEventListener('change', load);

    (async () => {
      if (!localStorage.getItem('token')) { location.href = '/'; return; }
      await loadDatabases();
      await load();
    })();
  </script>
</body>

</html>
